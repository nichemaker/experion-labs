<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experion Labs — Agentic-First Deep-Tech Studio</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   Experion Labs — Redesign Prototype
   Design system stylesheet
   Fonts: Sora (display) · Plus Jakarta Sans (body/UI)
   ============================================================ */

:root {
  /* Ink / text */
  --ink:      #0A1A2F;
  --ink-2:    #18293F;
  --slate:    #56697F;
  --slate-2:  #8294AB;

  /* Surfaces */
  --bg:       #FFFFFF;
  --bg-tint:  #F2F7FD;
  --bg-tint2: #E9F1FB;
  --line:     #E6EDF7;
  --line-2:   #D7E2F0;

  /* Brand accents */
  --blue:     #1E6FE8;
  --blue-ink: #1556C2;
  --cyan:     #10A6C9;
  --green:    #21C08A;

  /* Dark panels */
  --panel:    #091525;
  --panel-2:  #0E2034;
  --panel-3:  #16304B;
  --panel-line: rgba(120,170,230,.14);
  --panel-ink:  #EAF2FF;
  --panel-sub:  #8AA2C0;

  /* Gradients */
  --grad-brand: linear-gradient(120deg, #1B3C77 0%, #1E6FE8 38%, #10A6C9 72%, #2ECf9A 100%);
  --grad-cta:   linear-gradient(100deg, #10A6C9 0%, #1E6FE8 100%);
  --grad-text:  linear-gradient(100deg, #10A6C9 0%, #1E6FE8 70%);

  /* Shape */
  --r-xs: 10px;
  --r-sm: 14px;
  --r:    20px;
  --r-lg: 26px;
  --pill: 999px;

  /* Shadow */
  --sh-1: 0 1px 2px rgba(16,40,80,.05), 0 8px 24px -14px rgba(16,40,80,.18);
  --sh-2: 0 2px 6px rgba(16,40,80,.06), 0 20px 48px -20px rgba(16,40,80,.28);
  --sh-dark: 0 30px 80px -30px rgba(7,18,38,.55), 0 8px 30px -12px rgba(7,18,38,.4);

  /* Accent driven by Tweaks (defaults to blue) */
  --accent: var(--blue);
  --accent-soft: rgba(30,111,232,.10);

  /* Density */
  --section-pad: 120px;
  --display-font: "Sora";
}

body.no-anim .reveal { opacity:1 !important; transform:none !important; transition:none !important; }
body.no-anim .view { animation:none !important; }

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: "Plus Jakarta Sans", system-ui, sans-serif;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.6;
}
h1,h2,h3,h4 { font-family: var(--display-font, "Sora"), "Sora", sans-serif; margin: 0; line-height: 1.04; letter-spacing: -.02em; color: var(--ink); }
p { margin: 0; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
::selection { background: rgba(30,111,232,.18); }

/* ---- layout ---- */
.wrap { max-width: 1240px; margin: 0 auto; padding: 0 40px; }
.section { padding: var(--section-pad) 0; position: relative; }
.section--tint { background: var(--bg-tint); }
.section--dark { background: var(--panel); color: var(--panel-ink); }

/* gradient ambient wash */
.ambient { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
.ambient::before {
  content:""; position:absolute; width:780px; height:780px; right:-220px; top:-260px;
  background: radial-gradient(circle at center, rgba(30,111,232,.13), transparent 62%);
}
.ambient::after {
  content:""; position:absolute; width:620px; height:620px; left:-200px; bottom:-220px;
  background: radial-gradient(circle at center, rgba(16,166,201,.12), transparent 64%);
}

/* ---- type helpers ---- */
.eyebrow {
  display:inline-flex; align-items:center; gap:8px;
  font-family:"Plus Jakarta Sans"; font-weight:700; font-size:12.5px;
  letter-spacing:.16em; text-transform:uppercase; color:var(--accent);
}
.eyebrow .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); }
.eyebrow--chip {
  background:#fff; border:1px solid var(--line); border-radius:var(--pill);
  padding:9px 18px; box-shadow:var(--sh-1);
}
.section--dark .eyebrow { color:#3FC8E6; }
.section--dark .eyebrow .dot { background:#3FC8E6; box-shadow:0 0 0 4px rgba(63,200,230,.18); }

.h-display { font-size: clamp(40px, 6vw, 76px); font-weight: 800; letter-spacing:-.035em; }
.h1 { font-size: clamp(34px, 4.6vw, 58px); font-weight: 800; letter-spacing:-.03em; }
.h2 { font-size: clamp(15px,1.15vw,17px); }
.grad { background: var(--grad-text); -webkit-background-clip:text; background-clip:text; color:transparent; }
.muted { color: var(--slate); }
.lead { font-size: clamp(17px,1.35vw,20px); color: var(--slate); line-height:1.62; }
.section--dark .muted, .section--dark .lead { color: var(--panel-sub); }
.section--dark h1, .section--dark h2, .section--dark h3 { color: var(--panel-ink); }

/* ---- buttons ---- */
.btn { display:inline-flex; align-items:center; gap:9px; border:0; border-radius:var(--pill);
  font-weight:700; font-size:15px; padding:14px 24px; transition:transform .18s, box-shadow .25s, background .2s; white-space:nowrap; }
.btn svg { width:17px; height:17px; }
.btn-primary { background: var(--grad-cta); color:#fff; box-shadow: 0 10px 26px -10px rgba(30,111,232,.6); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 16px 34px -10px rgba(30,111,232,.66); }
.btn-primary .arrow { transition: transform .2s; }
.btn-primary:hover .arrow { transform: translateX(4px); }
.btn-ghost { background:#fff; color:var(--ink); border:1px solid var(--line-2); box-shadow:var(--sh-1); }
.btn-ghost:hover { transform: translateY(-2px); border-color:var(--accent); color:var(--accent); }
.btn-dark { background:rgba(255,255,255,.06); color:#fff; border:1px solid rgba(255,255,255,.16); }
.btn-dark:hover { background:rgba(255,255,255,.12); }
.btn-sm { padding:10px 18px; font-size:14px; }
.btn-lg { padding:17px 30px; font-size:16px; }

/* ---- chips / tags ---- */
.tag { display:inline-flex; align-items:center; gap:6px; border-radius:var(--pill);
  font-size:12.5px; font-weight:700; padding:6px 13px; letter-spacing:.02em; }
.tag-cyan { color:var(--cyan); background:rgba(16,166,201,.10); border:1px solid rgba(16,166,201,.22); }
.tag-blue { color:var(--blue); background:rgba(30,111,232,.09); border:1px solid rgba(30,111,232,.2); }
.tag-violet { color:#6366F1; background:rgba(99,102,241,.09); border:1px solid rgba(99,102,241,.2); }
.tag-line { color:var(--slate); background:#fff; border:1px solid var(--line-2); }

/* =========================================================
   NAV
   ========================================================= */
.nav { position: sticky; top:0; z-index: 60; }
.nav-inner {
  display:flex; align-items:center; justify-content:space-between; gap:24px;
  margin: 14px auto; max-width:1280px; padding: 12px 18px 12px 22px;
  background: rgba(255,255,255,.78); backdrop-filter: blur(18px) saturate(1.4);
  border:1px solid var(--line); border-radius: var(--pill);
  box-shadow: 0 10px 40px -22px rgba(16,40,80,.4);
  transition: box-shadow .3s, background .3s;
}
.nav--scrolled .nav-inner { box-shadow: 0 16px 50px -22px rgba(16,40,80,.5); background: rgba(255,255,255,.9); }
.brand { display:flex; align-items:center; gap:11px; cursor:pointer; }
.brand-mark { width:38px; height:38px; flex:none; }
.brand-word { font-family:"Sora"; font-weight:800; font-size:19px; letter-spacing:.02em; color:var(--ink); line-height:1; }
.brand-word small { display:block; font-size:9.5px; letter-spacing:.42em; font-weight:700; color:var(--slate-2); margin-top:3px; }
.nav-links { display:flex; align-items:center; gap:6px; }
.nav-link { position:relative; display:flex; align-items:center; gap:5px; font-weight:600; font-size:15px;
  color:var(--ink-2); padding:9px 15px; border-radius:var(--pill); transition:background .18s,color .18s; }
.nav-link:hover { background: var(--accent-soft); color:var(--accent); }
.nav-link.active { color:var(--accent); }
.nav-link .chev { width:14px; height:14px; transition: transform .2s; }
.nav-item.open .chev { transform: rotate(180deg); }
.nav-actions { display:flex; align-items:center; gap:10px; }

/* dropdown */
.nav-item { position:relative; }
.nav-item::after {
  content:''; position:absolute; top:100%; left:-20px; right:-20px; height:20px;
}
.dropdown {
  position:absolute; top:calc(100% + 16px); left:50%; transform:translateX(-50%) translateY(8px);
  width:min(620px, 86vw); background:#fff; border:1px solid var(--line);
  border-radius:var(--r); box-shadow: var(--sh-2); padding:14px;
  opacity:0; visibility:hidden; transition:opacity .2s, transform .2s; z-index:80;
}
.nav-item.open .dropdown { opacity:1; visibility:visible; transform:translateX(-50%) translateY(0); }
.dropdown-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.dd-item { display:flex; gap:13px; padding:14px; border-radius:var(--r-sm); transition:background .16s; cursor:pointer; }
.dd-item:hover { background:var(--bg-tint); }
.dd-ico { width:42px; height:42px; flex:none; border-radius:12px; display:grid; place-items:center;
  background:var(--accent-soft); color:var(--accent); }
.dd-ico svg { width:20px; height:20px; }
.dd-title { font-weight:700; font-size:15px; color:var(--ink); display:flex; align-items:center; gap:7px; }
.dd-desc { font-size:13px; color:var(--slate); line-height:1.45; margin-top:2px; }
.dd-foot { margin-top:8px; padding:14px; border-radius:var(--r-sm); background:var(--bg-tint);
  display:flex; align-items:center; justify-content:space-between; }
.dd-foot span { font-size:13.5px; color:var(--slate); font-weight:600; }

/* mobile nav button */
.nav-burger { display:none; width:42px; height:42px; border-radius:12px; border:1px solid var(--line-2);
  background:#fff; place-items:center; }
.nav-burger svg { width:20px; height:20px; }

/* =========================================================
   HERO
   ========================================================= */
.hero { position:relative; overflow:hidden; padding: 56px 0 96px; }
.hero-grid { display:grid; grid-template-columns: 1.04fr .96fr; gap:56px; align-items:center; position:relative; z-index:2; }
.hero-badge { display:inline-flex; align-items:center; gap:9px; background:#fff; border:1px solid var(--line);
  border-radius:var(--pill); padding:7px 8px 7px 14px; box-shadow:var(--sh-1); font-size:13.5px; font-weight:600; color:var(--ink-2); }
.hero-badge b { color:var(--accent); }
.hero-badge .pip { background:var(--grad-cta); color:#fff; font-size:11px; font-weight:800; letter-spacing:.08em;
  padding:4px 9px; border-radius:var(--pill); }
.hero h1 { font-size: clamp(42px, 5.4vw, 72px); font-weight:800; letter-spacing:-.04em; margin:24px 0 0; }
.hero h1 .dot { color: var(--accent); }
.hero-sub { margin-top:22px; max-width:520px; }
.hero-cta { display:flex; gap:12px; margin-top:32px; flex-wrap:wrap; }
.hero-trust { margin-top:36px; padding-top:26px; border-top:1px solid var(--line); }
.hero-trust .lab { font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--slate-2); }
.hero-trust-row { display:flex; gap:26px; flex-wrap:wrap; margin-top:14px; align-items:center; }
.trust-item { display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px; color:var(--ink-2); }
.trust-item svg { width:16px; height:16px; color:var(--green); }

/* Auto-cycling product showcase (hero) */
.showcase { position:relative; }
.sc-tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.sc-tab { position:relative; display:flex; align-items:center; gap:10px; text-align:left; padding:11px 13px;
  background:#fff; border:1px solid var(--line); border-radius:var(--r-sm); cursor:pointer; transition:.2s; overflow:hidden; }
.sc-tab:hover { border-color:var(--line-2); }
.sc-tab.on { border-color:var(--accent); box-shadow:var(--sh-1);
  background:linear-gradient(180deg, #fff, var(--accent-soft)); }
.sc-ico { width:34px; height:34px; flex:none; border-radius:10px; display:grid; place-items:center;
  background:var(--bg-tint); color:var(--slate-2); transition:.2s; }
.sc-ico svg { width:18px; height:18px; }
.sc-tab.on .sc-ico { background:var(--grad-cta); color:#fff; }
.sc-tx { display:flex; flex-direction:column; min-width:0; line-height:1.12; }
.sc-tx b { font-family:"Sora"; font-size:14px; font-weight:800; color:var(--ink); letter-spacing:-.01em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sc-tx i { font-style:normal; font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
  color:var(--slate-2); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sc-tab.on .sc-tx i { color:var(--accent); }
.sc-prog { position:absolute; left:0; bottom:0; height:3px; width:100%; transform-origin:left;
  background:var(--grad-cta); animation:scProg linear forwards; }
@keyframes scProg { from { transform:scaleX(0); } to { transform:scaleX(1); } }
.sc-stage { transition:height .5s cubic-bezier(.2,.7,.2,1); }
.sc-fade { animation:scFade .55s cubic-bezier(.2,.7,.2,1); }
@keyframes scFade { from { opacity:0; transform:translateY(12px) scale(.99); } to { opacity:1; transform:none; } }
.sc-cta { display:inline-flex; align-items:center; gap:8px; margin-top:16px; padding:11px 18px; border-radius:var(--pill);
  background:#fff; border:1px solid var(--line-2); box-shadow:var(--sh-1); font-weight:700; font-size:14px; color:var(--ink);
  transition:.2s; }
.sc-cta svg { transition:transform .2s; }
.sc-cta:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-2px); }
.sc-cta:hover svg { transform:translateX(3px); }
body.no-anim .sc-prog { display:none; }
body.no-anim .sc-fade { animation:none; }

/* hero stat strip */
.hero-stats { display:flex; gap:34px; margin-top:30px; }
.hstat .n { font-family:"Sora"; font-weight:800; font-size:30px; letter-spacing:-.03em; }
.hstat .n .grad { display:inline; }
.hstat .l { font-size:13px; color:var(--slate); font-weight:600; margin-top:2px; }

/* =========================================================
   DARK DASHBOARD CARD (reused everywhere)
   ========================================================= */
.dash {
  background: linear-gradient(180deg, #0C1B2F 0%, #091525 100%);
  border:1px solid var(--panel-line); border-radius: var(--r-lg);
  box-shadow: var(--sh-dark); color: var(--panel-ink); padding:22px; position:relative; overflow:hidden;
}
.dash::before { content:""; position:absolute; inset:0;
  background: radial-gradient(600px 200px at 80% -10%, rgba(30,111,232,.22), transparent 70%); pointer-events:none; }
.dash-head { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1;
  padding-bottom:16px; border-bottom:1px solid var(--panel-line); }
.dash-title { font-size:12.5px; font-weight:700; letter-spacing:.13em; text-transform:uppercase; color:var(--panel-sub); }
.dash-title b { color:var(--panel-ink); }
.live { display:inline-flex; align-items:center; gap:7px; font-size:11.5px; font-weight:800; letter-spacing:.1em; color:#34E3A8; }
.live .blip { width:7px; height:7px; border-radius:50%; background:#34E3A8; box-shadow:0 0 0 0 rgba(52,227,168,.5); animation: blip 1.8s infinite; }
@keyframes blip { 0%{box-shadow:0 0 0 0 rgba(52,227,168,.5);} 70%{box-shadow:0 0 0 8px rgba(52,227,168,0);} 100%{box-shadow:0 0 0 0 rgba(52,227,168,0);} }

.kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px; position:relative; z-index:1; }
.kpi { background: rgba(255,255,255,.035); border:1px solid var(--panel-line); border-radius:14px; padding:14px; }
.kpi .k { font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--panel-sub); }
.kpi .v { font-family:"Sora"; font-weight:800; font-size:26px; margin-top:6px; letter-spacing:-.02em; }
.kpi .v.cyan { color:#3FC8E6; } .kpi .v.green { color:#34E3A8; } .kpi .v.blue { color:#5C9CFF; }
.kpi .d { font-size:11.5px; color:var(--panel-sub); margin-top:3px; display:flex; align-items:center; gap:4px; }
.kpi .d.up { color:#34E3A8; }

/* chat bubbles inside dash */
.feed { margin-top:16px; position:relative; z-index:1; }
.feed-head { display:flex; align-items:center; justify-content:space-between; font-size:11.5px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase; color:var(--panel-sub); margin-bottom:12px; }
.bubble { display:flex; gap:10px; margin-bottom:10px; align-items:flex-start; }
.bubble.ai { flex-direction:row-reverse; }
.avatar { width:26px; height:26px; flex:none; border-radius:8px; display:grid; place-items:center; font-size:11px; font-weight:800;
  background:rgba(255,255,255,.08); color:var(--panel-sub); }
.avatar.ai { background:var(--grad-cta); color:#fff; }
.msg { max-width:78%; background:rgba(255,255,255,.05); border:1px solid var(--panel-line); border-radius:13px; padding:11px 14px; font-size:13.5px; color:#D8E6F8; line-height:1.45; }
.bubble.ai .msg { background:rgba(30,111,232,.16); border-color:rgba(92,156,255,.3); }
.senti { display:inline-flex; align-items:center; gap:7px; margin-top:6px; font-size:11px; }
.senti b { padding:2px 8px; border-radius:var(--pill); font-weight:800; }
.senti .neg { background:rgba(245,158,66,.16); color:#F6B25A; }
.senti .pos { background:rgba(52,227,168,.16); color:#34E3A8; }
.senti .res { background:rgba(52,227,168,.16); color:#34E3A8; }
.senti span { color:var(--panel-sub); }

/* progress bars */
.bars { margin-top:14px; position:relative; z-index:1; }
.bar-row { margin-bottom:11px; }
.bar-row .top { display:flex; justify-content:space-between; font-size:12.5px; color:#C6D6EC; margin-bottom:6px; }
.bar-row .top b { color:#fff; }
.track { height:7px; border-radius:var(--pill); background:rgba(255,255,255,.08); overflow:hidden; }
.fill { height:100%; border-radius:var(--pill); background:var(--grad-cta); width:0; transition: width 1.2s cubic-bezier(.2,.7,.2,1); }

/* pipeline steps */
.steps { display:flex; flex-direction:column; gap:9px; margin-top:16px; position:relative; z-index:1; }
.step { display:flex; align-items:center; gap:13px; padding:14px; border-radius:14px;
  background:rgba(255,255,255,.035); border:1px solid var(--panel-line); transition:.3s; }
.step.done { background:rgba(33,192,138,.10); border-color:rgba(52,227,168,.32); }
.step .sn { width:30px; height:30px; flex:none; border-radius:9px; display:grid; place-items:center; font-weight:800; font-size:13px;
  background:rgba(63,200,230,.14); color:#3FC8E6; }
.step.done .sn { background:rgba(52,227,168,.2); color:#34E3A8; }
.step .stitle { font-weight:700; font-size:14px; color:#EAF2FF; }
.step .ssub { font-size:12px; color:var(--panel-sub); margin-top:1px; }
.step .check { margin-left:auto; width:20px; height:20px; color:#34E3A8; }

.insight { margin-top:14px; padding:14px 16px; border-radius:14px; position:relative; z-index:1;
  background:rgba(30,111,232,.12); border:1px solid rgba(92,156,255,.26); }
.insight .il { display:flex; align-items:center; gap:7px; font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:#5C9CFF; }
.insight p { font-size:13px; color:#D8E6F8; margin-top:6px; line-height:1.5; }

/* =========================================================
   SECTION HEADERS
   ========================================================= */
.sec-head { max-width:720px; }
.sec-head.center { margin:0 auto; text-align:center; }
.sec-head .eyebrow { margin-bottom:18px; }
.sec-head h2 { font-size:clamp(32px,3.6vw,50px); font-weight:800; letter-spacing:-.03em; }
.sec-head p { margin-top:18px; }

/* =========================================================
   PROCESS (How we do it)
   ========================================================= */
.process { display:grid; grid-template-columns: 1fr 1.25fr; gap:64px; align-items:center; }
.proc-list { display:flex; flex-direction:column; gap:6px; }
.proc-item { display:flex; gap:20px; padding:24px; border-radius:var(--r); border:1px solid transparent; transition:.25s; cursor:default; position:relative; }
.proc-item:hover { background:#fff; border-color:var(--line); box-shadow:var(--sh-1); }
.proc-num { width:46px; height:46px; flex:none; border-radius:13px; display:grid; place-items:center; font-family:"Sora";
  font-weight:800; font-size:18px; background:var(--accent-soft); color:var(--accent); transition:.25s; }
.proc-item:hover .proc-num { background:var(--grad-cta); color:#fff; }
.proc-item h3 { font-size:20px; font-weight:700; }
.proc-item p { margin-top:8px; font-size:15px; color:var(--slate); }
.proc-visual { align-self:stretch; }

/* =========================================================
   FEATURE CARDS GRID (what sets us apart)
   ========================================================= */
.cards { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
.fcard { background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:30px; transition:.25s; position:relative; overflow:hidden; }
.fcard:hover { transform:translateY(-4px); box-shadow:var(--sh-2); border-color:var(--line-2); }
.fcard .ico { width:52px; height:52px; border-radius:15px; display:grid; place-items:center; margin-bottom:22px; }
.fcard .ico svg { width:24px; height:24px; }
.ico.cyan { background:rgba(16,166,201,.12); color:var(--cyan); }
.ico.blue { background:rgba(30,111,232,.10); color:var(--blue); }
.ico.violet { background:rgba(99,102,241,.10); color:#6366F1; }
.ico.green { background:rgba(33,192,138,.12); color:var(--green); }
.fcard h3 { font-size:20px; font-weight:700; }
.fcard p { margin-top:11px; font-size:15px; color:var(--slate); line-height:1.6; }
.fcard .seam { position:absolute; right:-30px; top:-30px; width:120px; height:120px; border-radius:50%;
  background:radial-gradient(circle, var(--accent-soft), transparent 70%); opacity:0; transition:.3s; }
.fcard:hover .seam { opacity:1; }

/* =========================================================
   PRODUCT / SOLUTION SPLIT
   ========================================================= */
.split { display:grid; grid-template-columns: 1fr 1.12fr; gap:56px; align-items:center; }
.split.rev { grid-template-columns: 1.12fr 1fr; }
.split.rev .split-copy { order:2; } .split.rev .split-visual { order:1; }
.prod-kicker { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.prod-eyebrow { font-size:13px; font-weight:800; letter-spacing:.13em; text-transform:uppercase; color:var(--cyan); }
.prod-icon { width:60px; height:60px; border-radius:17px; display:grid; place-items:center; margin-bottom:18px;
  background:linear-gradient(135deg, rgba(16,166,201,.16), rgba(30,111,232,.12)); color:var(--blue); }
.prod-icon svg { width:28px; height:28px; }
.split h3 { font-size:clamp(32px,3.4vw,46px); font-weight:800; letter-spacing:-.03em; margin-top:6px; }
.split-lead { margin-top:18px; font-size:17px; color:var(--slate); line-height:1.62; max-width:520px; }
.split-lead b { color:var(--ink); }
.feat-list { list-style:none; padding:0; margin:26px 0 0; display:flex; flex-direction:column; gap:16px; }
.feat-list li { display:flex; gap:13px; font-size:15.5px; color:var(--slate); line-height:1.5; }
.feat-list li b { color:var(--ink); }
.feat-list .fi { width:24px; height:24px; flex:none; border-radius:8px; display:grid; place-items:center;
  background:var(--accent-soft); color:var(--accent); margin-top:1px; }
.feat-list .fi svg { width:13px; height:13px; }
.chip-row { display:flex; gap:9px; flex-wrap:wrap; margin-top:26px; }

/* index rows (products / solutions list) */
.index-list { display:flex; flex-direction:column; gap:14px; max-width:1000px; margin:0 auto; }
.index-row { display:flex; align-items:center; gap:20px; padding:22px 26px; background:#fff;
  border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--sh-1); transition:.22s; cursor:pointer; }
.index-row:hover { transform:translateY(-3px); box-shadow:var(--sh-2); border-color:var(--accent); }
.index-num { width:54px; height:54px; flex:none; border-radius:15px; display:grid; place-items:center; font-family:"Sora";
  font-weight:800; font-size:18px; background:var(--accent-soft); color:var(--accent); }
.index-ico { width:52px; height:52px; flex:none; border-radius:14px; display:grid; place-items:center;
  background:linear-gradient(135deg, rgba(16,166,201,.14), rgba(30,111,232,.1)); color:var(--blue); }
.index-ico svg { width:24px; height:24px; }
.index-main { flex:1; min-width:0; }
.index-main .it { display:flex; align-items:baseline; gap:11px; flex-wrap:wrap; }
.index-main .it h4 { font-family:"Sora"; font-size:21px; font-weight:800; }
.index-main .it .kick { font-size:12px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--cyan); }
.index-main .id { font-size:14.5px; color:var(--slate); margin-top:4px; }
.index-tags { display:flex; gap:8px; flex:none; }
.index-arrow { width:40px; height:40px; flex:none; border-radius:50%; display:grid; place-items:center;
  background:var(--bg-tint); color:var(--accent); transition:.22s; }
.index-row:hover .index-arrow { background:var(--grad-cta); color:#fff; transform:translateX(3px); }

/* =========================================================
   STATS BAND
   ========================================================= */
.statband { display:grid; grid-template-columns:repeat(4,1fr); gap:24px; }
.statband .s { text-align:center; }
.statband .s .n { font-family:"Sora"; font-weight:800; font-size:clamp(38px,4vw,56px); letter-spacing:-.03em; }
.statband .s .l { font-size:14.5px; color:var(--panel-sub); margin-top:6px; font-weight:600; }
.statband .s .n.cyan{color:#3FC8E6;} .statband .s .n.green{color:#34E3A8;} .statband .s .n.blue{color:#5C9CFF;}

/* =========================================================
   CTA + CONTACT
   ========================================================= */
.cta-box { background: var(--panel); border-radius:32px; padding:72px 64px; position:relative; overflow:hidden; box-shadow:var(--sh-dark); }
.cta-box::before { content:""; position:absolute; inset:0; background:
  radial-gradient(700px 320px at 18% 0%, rgba(30,111,232,.34), transparent 62%),
  radial-gradient(640px 320px at 92% 110%, rgba(16,166,201,.32), transparent 60%); }
.cta-grid { position:relative; z-index:1; display:grid; grid-template-columns:1.2fr 1fr; gap:48px; align-items:center; }
.cta-box h2 { font-size:clamp(34px,3.6vw,52px); font-weight:800; letter-spacing:-.03em; color:#fff; }
.cta-box .lead { color:#B9CCE6; margin-top:18px; }
.cta-points { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:14px; }
.cta-points li { display:flex; gap:12px; align-items:center; color:#DCE8F8; font-size:15.5px; font-weight:600; }
.cta-points .fi { width:26px; height:26px; flex:none; border-radius:8px; display:grid; place-items:center; background:rgba(52,227,168,.16); color:#34E3A8; }
.cta-points .fi svg{width:15px;height:15px;}

/* contact form */
.form-card { background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:34px; box-shadow:var(--sh-2); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.field { margin-top:18px; }
.field:first-child { margin-top:0; }
.field label { display:block; font-size:11.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--slate-2); margin-bottom:8px; }
.field input, .field select, .field textarea { width:100%; border:1px solid var(--line-2); border-radius:var(--r-sm);
  padding:14px 16px; font-family:inherit; font-size:15px; color:var(--ink); background:var(--bg); transition:.18s; }
.field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); }
.field textarea { resize:vertical; min-height:120px; }

/* =========================================================
   FOOTER
   ========================================================= */
.footer { background:var(--panel); color:var(--panel-sub); padding:72px 0 34px; }
.foot-grid { display:grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap:40px; }
.foot-brand .brand-word { color:#fff; }
.foot-brand p { margin-top:18px; max-width:300px; font-size:14.5px; line-height:1.6; }
.foot-col h5 { color:#fff; font-family:"Sora"; font-size:14px; font-weight:700; letter-spacing:.02em; margin-bottom:16px; }
.foot-col a { display:block; font-size:14.5px; color:var(--panel-sub); padding:7px 0; transition:.16s; }
.foot-col a:hover { color:#fff; }
.foot-bottom { margin-top:54px; padding-top:26px; border-top:1px solid var(--panel-line);
  display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; font-size:13.5px; }
.foot-badges { display:flex; gap:10px; flex-wrap:wrap; }
.foot-badge { display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; color:#B9CCE6;
  background:rgba(255,255,255,.05); border:1px solid var(--panel-line); border-radius:var(--pill); padding:7px 14px; }
.foot-badge svg{width:14px;height:14px;color:#34E3A8;}

/* =========================================================
   SCROLL REVEAL + view transition
   ========================================================= */
.reveal { opacity:0; transform: translateY(26px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
.reveal.in { opacity:1; transform:none; }
.view { animation: none; }
@keyframes viewIn { from { opacity:0; transform: translateY(10px);} to { opacity:1; transform:none; } }
@media (prefers-reduced-motion: reduce) { .reveal { opacity:1; transform:none; transition:none; } .view{animation:none;} }

/* =========================================================
   DENSITY
   ========================================================= */
body.density-compact { --section-pad: 84px; }
body.density-comfy   { --section-pad: 150px; }

/* =========================================================
   RESPONSIVE
   ========================================================= */
@media (max-width: 1080px) {
  .hero-grid, .process, .split, .split.rev, .cta-grid { grid-template-columns:1fr; gap:40px; }
  .split.rev .split-copy { order:1; } .split.rev .split-visual { order:2; }
  .cards { grid-template-columns:1fr 1fr; }
  .statband { grid-template-columns:1fr 1fr; gap:34px 24px; }
  .foot-grid { grid-template-columns:1fr 1fr; gap:34px; }
}
@media (max-width: 720px) {
  .wrap { padding:0 22px; }
  :root { --section-pad: 76px; }
  .nav-links, .nav-actions .btn-ghost { display:none; }
  .nav-burger { display:grid; }
  .cards { grid-template-columns:1fr; }
  .statband { grid-template-columns:1fr 1fr; }
  .form-row { grid-template-columns:1fr; }
  .hero-stats { gap:22px; flex-wrap:wrap; }
  .cta-box { padding:44px 26px; }
  .index-row { flex-wrap:wrap; }
  .index-tags { order:3; }
}

    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

(function () {
  const { useState, useEffect, useRef } = React;

  // animate a fill bar / counter when scrolled into view
  function useInView(threshold = 0.3) {
    const ref = useRef(null);
    const [seen, setSeen] = useState(false);
    useEffect(() => {
      const el = ref.current; if (!el) return;
      const r = el.getBoundingClientRect();
      if (r.top < (window.innerHeight || 800) * 0.95) { setSeen(true); return; }
      let done = false;
      const io = new IntersectionObserver(([e]) => { if (e.isIntersecting) { done = true; setSeen(true); io.disconnect(); } }, { threshold });
      io.observe(el);
      const fb = setTimeout(() => { if (!done) setSeen(true); }, 1500);
      return () => { io.disconnect(); clearTimeout(fb); };
    }, []);
    return [ref, seen];
  }

  function Bars({ rows }) {
    const [ref, seen] = useInView();
    return (
      <div className="bars" ref={ref}>
        {rows.map((r, i) => (
          <div className="bar-row" key={i}>
            <div className="top"><span>{r.label}</span><b>{r.val}%</b></div>
            <div className="track"><div className="fill" style={{ width: seen ? r.val + "%" : 0, transitionDelay: i * 120 + "ms" }} /></div>

/* shell.jsx — Nav, Footer, Reveal — exported to window */
(function () {
  const { useState, useEffect, useRef } = React;

  /* scroll-reveal wrapper */
  function Reveal({ children, delay = 0, style, className = "" }) {
    const ref = useRef(null);
    const [seen, setSeen] = useState(false);
    useEffect(() => {
      const el = ref.current; if (!el) return;
      // already in view on mount → reveal immediately
      const r = el.getBoundingClientRect();
      if (r.top < (window.innerHeight || 800) * 0.95) { setSeen(true); return; }
      let done = false;
      const io = new IntersectionObserver(([e]) => { if (e.isIntersecting) { done = true; setSeen(true); io.disconnect(); } }, { threshold: 0.12 });
      io.observe(el);
      // safety: never let content stay hidden if IO doesn't fire
      const fb = setTimeout(() => { if (!done) setSeen(true); }, 1500);
      return () => { io.disconnect(); clearTimeout(fb); };
    }, []);
    return <div ref={ref} className={"reveal " + (seen ? "in " : "") + className} style={{ transitionDelay: delay + "ms", ...style }}>{children}</div>;
  }

  function NavItem({ label, items, page, go, openMenu, setOpenMenu, foot }) {
    const open = openMenu === label;
    return (
      <div className={"nav-item" + (open ? " open" : "")}
        onMouseEnter={() => setOpenMenu(label)} onMouseLeave={() => setOpenMenu(null)}>
        <a className={"nav-link" + (page === label.toLowerCase() ? " active" : "")}
          onClick={() => { go(label.toLowerCase()); setOpenMenu(null); }}>
          {label}<Icon name="chevron" className="chev" />
        </a>
        <div className="dropdown" role="menu">
          <div className="dropdown-grid">
            {items.map((it) => (
              <div className="dd-item" key={it.title} onClick={() => { go(label.toLowerCase(), it.anchor); setOpenMenu(null); }}>

                <div><div className="dd-title">{it.title}{it.tag && <span className="tag tag-cyan" style={{ padding: "3px 9px", fontSize: 11 }}>{it.tag}</span>}</div>
                  <div className="dd-desc">{it.desc}</div></div>
              </div>
            ))}
          </div>
          <div className="dd-foot">
            <span>{foot}</span>
            <a className="btn btn-primary btn-sm" onClick={(e) => { e.stopPropagation(); go(label.toLowerCase()); setOpenMenu(null); }}>View all <Icon name="arrow" className="arrow" /></a>
          </div>
        </div>
      </div>
    );
  }

  function Nav({ page, go }) {

      { title: "Contact", desc: "Book a discovery call or send us your project brief.", icon: "mail", anchor: "contact" },
    ];
    return (
      <nav className={"nav" + (scrolled ? " nav--scrolled" : "")}>
        <div className="nav-inner">
          <div className="brand" onClick={() => go("home")}>
            <Logo size={38} />
            <div className="brand-word">EXPERION<small>L A B S</small></div>
          </div>
          <div className="nav-links">
            <a className={"nav-link" + (page === "home" ? " active" : "")} onClick={() => go("home")}>Home</a>
            <NavItem label="Products" items={productItems} page={page} go={go} openMenu={openMenu} setOpenMenu={setOpenMenu} foot="2 flagship products on AWS Agent Core" />

            <button className="nav-burger" onClick={() => go("products")} aria-label="Menu"><Icon name="menu" /></button>
          </div>
        </div>
      </nav>
    );
  }

  function Footer({ go }) {
    const col = (h, links) => (

  <script type="text/babel">
/* app.jsx — router, tweaks, mount */
(function () {
  const { useState, useEffect, useRef } = React;
  const { useTweaks, TweaksPanel, TweakSection, TweakColor, TweakRadio, TweakToggle, TweakSelect } = window;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#1E6FE8",
    "density": "regular",
    "headingFont": "Sora",
    "animations": true
  }/*EDITMODE-END*/;

  const ACCENT_SOFT = {
    "#1E6FE8": "rgba(30,111,232,.10)",
    "#10A6C9": "rgba(16,166,201,.12)",
    "#6366F1": "rgba(99,102,241,.10)",
    "#21C08A": "rgba(33,192,138,.12)",
  };

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [page, setPage] = useState("home");
    const pendingAnchor = useRef(null);

    // apply tweaks → CSS vars / body classes
    useEffect(() => {
      const r = document.documentElement;
      r.style.setProperty("--accent", t.accent);
      r.style.setProperty("--accent-soft", ACCENT_SOFT[t.accent] || "rgba(30,111,232,.10)");
      document.body.className = "density-" + t.density + (t.animations ? "" : " no-anim");
      r.style.setProperty("--display-font", t.headingFont);
    }, [t]);

    // navigation
    const go = (p, anchor) => {
      pendingAnchor.current = anchor || null;
      if (p === page) { scrollAnchor(); return; }
      setPage(p);
      window.scrollTo({ top: 0, behavior: "auto" });
    };
    const scrollAnchor = () => {
      const a = pendingAnchor.current;
      if (!a) return;
      requestAnimationFrame(() => setTimeout(() => {
        document.getElementById(a)?.scrollIntoView({ behavior: "smooth", block: "start" });
        pendingAnchor.current = null;
      }, 80));
    };
    useEffect(() => { scrollAnchor(); }, [page]);

    const map = { home: window.Home, products: window.Products, solutions: window.Solutions, company: window.Company };
    const Page = map[page] || window.Home;

    return (
      <React.Fragment>
        <window.Nav page={page} go={go} />
        <main><Page go={go} /></main>
        <window.Footer go={go} />
        <TweaksPanel title="Tweaks">
          <TweakSection label="Brand accent" />
          <TweakColor label="Accent color" value={t.accent}
            options={["#1E6FE8", "#10A6C9", "#6366F1", "#21C08A"]}
            onChange={(v) => setTweak("accent", v)} />
          <TweakSection label="Typography" />
          <TweakSelect label="Heading font" value={t.headingFont}
            options={["Sora", "Space Grotesk", "Plus Jakarta Sans"]}
            onChange={(v) => setTweak("headingFont", v)} />
          <TweakSection label="Layout" />
          <TweakRadio label="Density" value={t.density}
            options={["compact", "regular", "comfy"]}
            onChange={(v) => setTweak("density", v)} />
          <TweakToggle label="Scroll animations" value={t.animations}
            onChange={(v) => setTweak("animations", v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();

  </script>
</body>
