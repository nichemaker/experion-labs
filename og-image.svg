<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="brand" x1="0" y1="630" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B3C77"/>
      <stop offset="38%" stop-color="#1E6FE8"/>
      <stop offset="72%" stop-color="#10A6C9"/>
      <stop offset="100%" stop-color="#2ECF9A"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10A6C9"/>
      <stop offset="100%" stop-color="#1E6FE8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#1E6FE8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1E6FE8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="90%" r="45%">
      <stop offset="0%" stop-color="#10A6C9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10A6C9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#091525"/>
  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo mark (stacked chevrons) -->
  <g transform="translate(80, 200)">
    <svg width="72" height="72" viewBox="0 0 48 48" fill="none">
      <path d="M24 5 9 14v6l15-9 15 9v-6L24 5Z" fill="url(#brand)"/>
      <path d="M24 17 9 26v6l15-9 15 9v-6l-15-9Z" fill="url(#brand)" opacity="0.8"/>
      <path d="M24 29 9 38v5l15-9 15 9v-5l-15-9Z" fill="url(#brand)" opacity="0.6"/>
    </svg>
  </g>

  <!-- Wordmark -->
  <text x="170" y="252" font-family="Sora, ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="52" fill="#EAF2FF" letter-spacing="-1">Experion Labs</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="Plus Jakarta Sans, ui-sans-serif, system-ui, sans-serif" font-weight="600" font-size="28" fill="#8AA2C0" letter-spacing="0">Agentic-First Deep-Tech Studio</text>

  <!-- Accent rule -->
  <rect x="80" y="360" width="200" height="4" rx="2" fill="url(#brand)"/>

  <!-- Sub-descriptor -->
  <text x="80" y="420" font-family="Plus Jakarta Sans, ui-sans-serif, system-ui, sans-serif" font-weight="500" font-size="20" fill="#56697F">Enterprise-scale intelligence on AWS Agent Core</text>

  <!-- Domain badge -->
  <rect x="80" y="510" width="220" height="44" rx="22" fill="none" stroke="rgba(120,170,230,0.22)" stroke-width="1"/>
  <text x="190" y="538" font-family="Plus Jakarta Sans, ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="15" fill="#8AA2C0" text-anchor="middle" letter-spacing="0.04em">experionlabs.com</text>
</svg>
